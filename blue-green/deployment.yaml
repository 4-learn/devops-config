# Blue（現行版 v1）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-demo-blue
spec:
  replicas: 2
  selector:
    matchLabels: {app: devops-demo, version: blue}
  template:
    metadata:
      labels: {app: devops-demo, version: blue}
    spec:
      containers:
        - name: devops-demo
          image: ghcr.io/4-learn/devops-demo:v1
          ports: [{containerPort: 8000}]
---
# Green（新版 v2）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-demo-green
spec:
  replicas: 2
  selector:
    matchLabels: {app: devops-demo, version: green}
  template:
    metadata:
      labels: {app: devops-demo, version: green}
    spec:
      containers:
        - name: devops-demo
          image: ghcr.io/4-learn/devops-demo:v2
          ports: [{containerPort: 8000}]
